name: Type check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  zuban:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install zuban
        run: python -m pip install --upgrade pip zuban

      - name: Run type check
        run: zuban check src
